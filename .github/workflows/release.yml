name: Release

# Push a tag like v1.0.0 and this builds a signed release APK (for direct
# install / sharing) and a signed AAB (App Bundle, for Google Play internal
# testing) with the production backend baked in, then publishes both on the
# GitHub Releases page. Bump `version:` in pubspec.yaml before tagging so
# Android accepts the update over the old install.
on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.4
          cache: true

      - name: Restore signing keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d \
            > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build signed APK + AAB
        env:
          DEFINES: >-
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            --dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
            --dart-define=FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
            --dart-define=FIREBASE_SENDER_ID=${{ secrets.FIREBASE_SENDER_ID }}
            --dart-define=FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}
            --dart-define=DEMO_PASSWORD=${{ secrets.DEMO_PASSWORD }}
        run: |
          flutter build apk --release $DEFINES         # direct install / sharing
          flutter build appbundle --release $DEFINES   # Google Play

      - name: Name the artifacts
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             terminator-${{ github.ref_name }}.apk
          cp build/app/outputs/bundle/release/app-release.aab \
             terminator-${{ github.ref_name }}.aab

      # "What's new" for Play, generated from the in-app changelog so the store
      # text always matches what testers see in the app. The tag is v2.0.1; the
      # changelog keys by bare version (2.0.1). Missing entry -> fail loudly.
      - name: Generate Play release notes from changelog
        run: |
          mkdir -p whatsnew
          VERSION="${GITHUB_REF_NAME#v}"
          dart run tool/whatsnew.dart "$VERSION" > whatsnew/whatsnew-cs-CZ.txt
          echo "----- whatsnew-cs-CZ.txt -----"
          cat whatsnew/whatsnew-cs-CZ.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            terminator-*.apk
            terminator-*.aab
          generate_release_notes: true

      # Upload the AAB straight to Google Play internal testing. Creates a
      # DRAFT release on the internal track — review and roll it out to testers
      # manually in Play Console. Needs the play-uploader service account with
      # "Release apps to testing tracks" permission on the Termínátor app.
      - name: Upload AAB to Play internal testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: cz.kuzelky.terminator
          releaseFiles: terminator-${{ github.ref_name }}.aab
          whatsNewDirectory: whatsnew
          track: internal
          status: draft

name: Supabase keep-alive

# The Supabase free tier pauses projects after ~7 days without API activity.
# Two pings a week keep Termínátor awake.
on:
  schedule:
    - cron: '0 6 * * 1,4' # Monday and Thursday 06:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping database
        run: |
          curl --fail --silent --show-error \
            "${{ secrets.SUPABASE_URL }}/rest/v1/tournaments?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            > /dev/null
          echo "Supabase pinged."

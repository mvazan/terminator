name: Deploy backend (Supabase)

# Whenever anything under supabase/ lands on main, apply migrations and
# redeploy the notify Edge Function. Firebase needs no deploy step — its
# service account lives as a Supabase secret, set once (SETUP.md step 6).
on:
  push:
    branches: [main]
    paths: ['supabase/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
      - name: Apply migrations
        run: supabase db push
      - name: Deploy notify function
        # --no-verify-jwt: DB triggers can't send JWTs; the function checks
        # the x-webhook-secret header against its WEBHOOK_SECRET secret.
        run: supabase functions deploy notify --no-verify-jwt

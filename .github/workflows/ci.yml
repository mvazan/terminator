name: CI

# Every push and PR: analyzer + tests. Keeps main always releasable.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.38.4
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
